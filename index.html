<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    
    <!-- SEO Meta Tags -->
    <title>SkyBound Pro - Professional Flight Operations Platform</title>
    <meta name="description" content="Advanced flight planning, weight & balance, weather briefing, and aviation tools for professional pilots. Real-time aviation data, sectional charts, and comprehensive flight management." />
    <meta name="keywords" content="flight planning, aviation software, pilot tools, weight balance calculator, aviation weather, flight operations, sectional charts, aviation navigation, pilot logbook, flight training" />
    <meta name="author" content="SkyBound Pro" />
    <meta name="robots" content="index, follow" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="SkyBound Pro - Professional Flight Operations Platform" />
    <meta property="og:description" content="Advanced flight planning, weight & balance, weather briefing, and aviation tools for professional pilots." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:site_name" content="SkyBound Pro" />
    <meta property="og:locale" content="en_US" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SkyBound Pro - Professional Flight Operations Platform" />
    <meta name="twitter:description" content="Advanced flight planning, weight & balance, weather briefing, and aviation tools for professional pilots." />
    <meta name="twitter:image" content="/og-image.png" />
    
    <!-- Performance Optimizations -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="//api.weather.gov" />
    <link rel="dns-prefetch" href="//avwx.rest" />
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#0066cc" />
    <meta name="msapplication-TileColor" content="#0066cc" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
